version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-password}
      MYSQL_DATABASE: project_recommender
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend
    container_name: backend_api
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://mysql:3306/project_recommender
      - DB_USER=root
      - DB_PASS=${DB_PASS:-password}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - mysql

  frontend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.frontend
    container_name: frontend_app
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
