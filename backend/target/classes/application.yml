spring:
  application:
    name: project-idea-recommender
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/project_recommender}
    username: ${DB_USER:root}
    password: ${DB_PASS:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: ${PORT:8080}

openai:
  api:
    key: ${OPENAI_API_KEY:}

gemini:
  api:
    key: ${GEMINI_API_KEY:}
